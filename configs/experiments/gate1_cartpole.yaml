# Gate1 Cart-Pole E-SINDy Experiment Configuration
# S07: Ensemble SINDy with Bootstrap

# Dataset Settings
dataset_version: cartpole_ood_v1
system: cartpole

# Experiment Settings
n_train: 10           # Number of training trajectories
seed: 0               # Random seed for reproducibility
track: standardized   # 'standardized' (Savgol dx) or 'author_recommended' (analytic dx)
note: base            # Note for run_id

# SINDy Library Settings
library_config: gate0_min  # Library configuration from LIBRARY_CONFIGS

# E-SINDy Settings
n_bootstrap: 20            # Number of bootstrap samples
thresholds:                # Threshold grid for sweep
  - 0.0
  - 0.0001
  - 0.0005
  - 0.001
  - 0.005
  - 0.01
  - 0.02
  - 0.05

# Threshold Selection Settings
best_threshold_metric: val_r2_mean    # Primary metric for selection
tie_break_sparsity: true              # Use sparsity as tie-breaker
tie_break_uncertainty: true           # Use uncertainty as second tie-breaker
tie_tolerance: 0.001                  # Tolerance for considering metrics "tied"

# Final Fit Settings
final_fit_split: train                # 'train' or 'train_val' (default: train)

# Optimizer Settings
max_iter: 10               # Maximum STLSQ iterations
ridge_alpha: 0.0           # Ridge regularization (0 = no regularization)

# Inclusion Probability Settings
inclusion_eps: 0.0         # |coef| > eps means "included"
inclusion_threshold: 0.5   # P(included) > this means "active"

# Fixed Settings (do not modify)
gate: gate1
method: esindy